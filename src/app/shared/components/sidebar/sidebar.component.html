<aside class="w-64 bg-[#161b22] border-r border-gray-700 flex-shrink-0 flex flex-col h-full">
    <!-- Logo -->
    <div class="p-4 flex items-center space-x-3 border-b border-gray-700 h-16">
        <div class="h-8 w-8 bg-indigo-600 rounded flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd"
                    d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z"
                    clip-rule="evenodd" />
            </svg>
        </div>
        <span class="text-lg font-bold text-white tracking-wide">FluxForge</span>
    </div>

    <!-- Nav Links -->
    <nav class="flex-1 p-4 space-y-1">
        <a href="#" class="bg-gray-800 text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">
            <svg class="text-gray-300 mr-3 flex-shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            Projects
        </a>
        <a href="#"
            class="text-gray-400 hover:bg-gray-800 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">
            <svg class="text-gray-400 mr-3 flex-shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
            Runners
        </a>
    </nav>

    <!-- User Profile -->
    <div class="p-4 border-t border-gray-700">
        <div class="flex items-center">
            <div
                class="h-8 w-8 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center text-xs font-bold text-white">
                {{ getInitials(user?.displayName) }}
            </div>
            <div class="ml-3">
                <p class="text-sm font-medium text-white">{{ user?.displayName }}</p>
                <button (click)="logout()" class="text-xs text-gray-500 hover:text-white">Sign out</button>
            </div>
        </div>
    </div>
</aside>
